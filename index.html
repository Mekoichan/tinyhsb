<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爱狗小游戏</title>
    
    <style>
        :root {
            --c-bg: #1a1c2c;
            --c-panel: #29366f;
            --c-panel-dark: #1a2c5e;
            --c-border: #000000;
            --c-text: #f4f4f4;
            --c-text-dim: #94b0c2;
            --c-damage: #b13e53;
            --c-gentle: #a7f070;
            --c-heal: #41a6f6;
            --c-gold: #ffcd75;
            --c-cyan: #41a6f6;
            --c-purple: #9d4edd;
            --c-orange: #ef7d57;
            --c-pink: #ffb7c5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            cursor: none;
            font-family: 'DotGothic16', 'Microsoft YaHei', monospace;
            background: var(--c-bg);
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--c-bg);
            transition: background 2s ease;
        }
        #game-container.pink-bg {
            background: linear-gradient(180deg, #ffd6e0 0%, #ffb7c5 50%, #ff9eb1 100%) !important;
        }

        /* ===== Pixel Grid ===== */
        #pixel-grid {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 4px 4px;
            z-index: 1;
        }

        /* ===== Vignette ===== */
        #vignette {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
            z-index: 2;
        }

        /* ===== Scanlines ===== */
        #scanlines {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.12), rgba(0,0,0,0.12) 1px, transparent 1px, transparent 3px);
            z-index: 201;
        }

        /* ===== HUD ===== */
        #hud {
            position: absolute;
            top: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            z-index: 30;
            pointer-events: none;
        }
        .hud-box {
            background: var(--c-panel-dark);
            border: 3px solid var(--c-border);
            box-shadow: 3px 3px 0 rgba(0,0,0,0.5);
            padding: 6px 10px;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: var(--c-text);
            letter-spacing: 1px;
        }
        .hud-box .hud-label { color: var(--c-text-dim); font-size: 8px; margin-bottom: 4px; }
        .hud-box .hud-value { color: var(--c-gold); font-size: 12px; }
        @media (max-width: 600px) {
            .hud-box { padding: 4px 8px; font-size: 8px; }
            .hud-box .hud-label { font-size: 6px; }
            .hud-box .hud-value { font-size: 10px; }
        }

        /* ===== Character Zone ===== */
        #character-zone {
            position: relative;
            width: 280px;
            height: 380px;
            margin-top: 40px;
            flex-shrink: 0;
            z-index: 10;
        }
        @media (max-width: 600px) { #character-zone { width: 220px; height: 300px; margin-top: 60px; } }
        @media (max-width: 400px) { #character-zone { width: 170px; height: 240px; margin-top: 70px; } }
        #character-zone .char-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #char-body { z-index: 3; }
        #char-expression { z-index: 2; }
        #char-suffocation { z-index: 4; opacity: 0; transition: opacity 0.15s ease; }
        #char-suffocation.active { opacity: 0.55; }
        #char-neck-red { z-index: 4; }
        #char-bandage { z-index: 5; }
        #char-flower { z-index: 6; }
        #char-flowers { z-index: 6; }
        #char-blanket { z-index: 5; }
        #char-tea { z-index: 6; }

        /* ===== Dialog Box ===== */
        #dialog-box {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 550px;
            min-height: 60px;
            background: var(--c-panel);
            border: 4px solid var(--c-border);
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
            padding: 14px 28px 14px 18px;
            z-index: 50;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        #dialog-box.visible { opacity: 1; }
        #dialog-box .dialog-name {
            font-family: 'Press Start 2P', monospace;
            font-weight: bold;
            font-size: 11px;
            color: var(--c-gold);
            white-space: nowrap;
            flex-shrink: 0;
            border-right: 2px solid var(--c-text-dim);
            padding-right: 10px;
            letter-spacing: 1px;
            line-height: 1.6;
        }
        #dialog-box .dialog-text {
            font-family: 'DotGothic16', monospace;
            font-size: 15px;
            color: var(--c-text);
            line-height: 1.5;
            letter-spacing: 0.5px;
            word-break: break-all;
            flex: 1;
        }
        #click-indicator {
            position: absolute;
            bottom: 6px;
            right: 10px;
            color: var(--c-gold);
            font-size: 14px;
            opacity: 0;
            pointer-events: none;
        }
        #click-indicator.visible {
            opacity: 1;
            animation: blink 0.8s steps(2) infinite;
        }
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.2; }
        }
        @media (max-width: 600px) {
            #dialog-box { top: 55px; width: 92%; padding: 10px 24px 10px 12px; border-width: 3px; }
            #dialog-box .dialog-name { font-size: 9px; padding-right: 6px; }
            #dialog-box .dialog-text { font-size: 13px; }
        }
        @media (max-width: 400px) {
            #dialog-box { top: 45px; padding: 8px 20px 8px 10px; }
            #dialog-box .dialog-name { font-size: 8px; }
            #dialog-box .dialog-text { font-size: 11px; }
        }

        /* ===== Interaction Dots ===== */
        #interaction-dots {
            position: absolute;
            bottom: 115px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 35;
        }
        @media (max-width: 600px) { #interaction-dots { bottom: 85px; gap: 6px; } }
        .dot {
            width: 12px; height: 12px;
            border: 2px solid var(--c-border);
            background: var(--c-panel-dark);
            transition: background 0.2s ease;
        }
        .dot.filled.damage { background: var(--c-damage); }
        .dot.filled.gentle { background: var(--c-gentle); }
        .dot.filled.heal { background: var(--c-heal); }
        .dot.filled { background: var(--c-gold); }
        @media (max-width: 600px) { .dot { width: 10px; height: 10px; } }

        /* ===== Item Bar ===== */
        #item-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 40;
            background: var(--c-panel-dark);
            border: 4px solid var(--c-border);
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
            padding: 12px 16px;
            transition: opacity 0.4s ease;
            max-width: 95%;
        }
        #item-bar.disabled { opacity: 0.3; pointer-events: none; }
        .item-slot {
            width: 90px; height: 90px;
            background: var(--c-bg);
            border: 3px solid var(--c-text-dim);
            cursor: none;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s ease, border-color 0.15s ease;
            position: relative;
        }
        .item-slot[data-item="whip"], .item-slot[data-item="blade"],
        .item-slot[data-item="needle"], .item-slot[data-item="candle"] {
            border-color: var(--c-damage);
        }
        .item-slot[data-item="flower"], .item-slot[data-item="tea"],
        .item-slot[data-item="blanket"], .item-slot[data-item="handkerchief"] {
            border-color: var(--c-gentle);
        }
        .item-slot[data-item="bandage"] { border-color: var(--c-heal); }
        .item-slot:hover {
            border-color: var(--c-gold);
            transform: scale(1.08);
            box-shadow: 0 0 0 2px var(--c-gold);
        }
        .item-slot:active { transform: scale(0.94); }
        .item-slot img {
            width: 72px; height: 72px;
            transform:scale(2);
            object-fit: contain;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            pointer-events: none;
        }
        @media (max-width: 600px) {
            #item-bar { gap: 6px; padding: 8px 12px; bottom: 12px; }
            .item-slot { width: 72px; height: 72px; border-width: 2px; }
            .item-slot img { width: 60px; height: 60px; }
        }
        @media (max-width: 400px) {
            #item-bar { gap: 4px; padding: 6px 8px; }
            .item-slot { width: 48px; height: 48px; }
            .item-slot img { width: 40px; height: 40px; }
        }

        /* ===== Ending Overlay ===== */
        #ending-overlay {
            position: absolute; inset: 0;
            background: rgba(10,10,20,0.92);
            z-index: 100;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            pointer-events: none; opacity: 0;
            transition: opacity 0.6s ease;
        }
        #ending-overlay.active { opacity: 1; pointer-events: all; }
        #ending-text-area {
            background: var(--c-panel-dark);
            border: 4px solid var(--c-border);
            box-shadow: 6px 6px 0 rgba(0,0,0,0.5);
            padding: 28px 36px;
            max-width: 80%; text-align: center;
            margin-bottom: 30px; position: relative;
        }
        #ending-tag {
            font-family: 'Press Start 2P', monospace;
            font-size: 9px; letter-spacing: 2px;
            margin-bottom: 14px;
            padding: 4px 10px; display: inline-block;
            border: 2px solid var(--c-border);
        }
        #ending-tag.good { background: #ffb7c5; color: #1a1c2c; border-color: #ffb7c5; }
        #ending-tag.normal { background: var(--c-text-dim); color: var(--c-bg); }
        #ending-tag.special { background: var(--c-gold); color: var(--c-bg); }
        #ending-tag.meta { background: var(--c-cyan); color: var(--c-bg); }
        #ending-tag.meta-final { background: var(--c-purple); color: var(--c-text); }
        #ending-tag.true { background: var(--c-pink); color: var(--c-bg); }
        #ending-title {
            font-family: 'DotGothic16', monospace;
            font-size: 32px; color: var(--c-gold);
            letter-spacing: 6px; margin-bottom: 18px;
            text-shadow: 3px 3px 0 var(--c-border);
        }
        #ending-description {
            font-family: 'DotGothic16', monospace;
            font-size: 16px; color: var(--c-text);
            line-height: 1.7; white-space: pre-wrap;
        }
        @media (max-width: 600px) {
            #ending-text-area { padding: 18px 24px; max-width: 90%; }
            #ending-title { font-size: 24px; letter-spacing: 4px; }
            #ending-description { font-size: 13px; }
            #ending-tag { font-size: 7px; }
        }
        #ending-buttons {
            display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
        }
        .ending-btn {
            padding: 12px 28px;
            font-family: 'DotGothic16', monospace;
            font-size: 16px; letter-spacing: 3px;
            border: 4px solid var(--c-border);
            background: var(--c-panel); color: var(--c-text);
            cursor: none;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.5);
            transition: transform 0.1s ease, background 0.15s ease;
            pointer-events: all;
        }
        .ending-btn:hover {
            background: var(--c-panel-dark);
            border-color: var(--c-gold);
            transform: translate(-2px,-2px);
            box-shadow: 6px 6px 0 rgba(0,0,0,0.5);
        }
        .ending-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 rgba(0,0,0,0.5); }
        .ending-btn.grayed { background: #333; color: #666; pointer-events: none; border-color: #555; box-shadow: none; opacity: 0.5; }
        @media (max-width: 600px) { .ending-btn { padding: 10px 20px; font-size: 14px; border-width: 3px; } }

        /* ===== Custom Cursor (hand) ===== */
        #custom-cursor {
            position: fixed; pointer-events: none; z-index: 9999;
            width: 44px; height: 44px;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            transform: translate(-8px,-8px);
            transition: none; will-change: left, top;
        }
        @media (max-width: 600px) { #custom-cursor { width: 36px; height: 36px; transform: translate(-6px,-6px); } }

        /* ===== Drag Ghost ===== */
        #drag-ghost {
            position: fixed; pointer-events: none; z-index: 9998;
            width: 50px; height: 50px; object-fit: contain;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
            opacity: 0.85; display: none;
            transform: translate(-50%,-50%); will-change: left, top;
        }
        @media (max-width: 600px) { #drag-ghost { width: 40px; height: 40px; } }

        /* ===== Animations ===== */
        @keyframes damageShake {
            0% { transform: translate(0,0); }
            25% { transform: translate(-3px,1px); }
            50% { transform: translate(3px,-1px); }
            75% { transform: translate(-1px,2px); }
            100% { transform: translate(0,0); }
        }
        #character-zone.damage-effect {
            animation: damageShake 0.2s ease-in-out 0s 2;
            filter: brightness(1.2) sepia(0.8) hue-rotate(-20deg);
        }
        @keyframes flashWhite {
            0% { background-color: rgba(255,255,240,0); }
            40% { background-color: rgba(255,255,200,0.5); }
            100% { background-color: rgba(255,255,240,0); }
        }
        @keyframes shakeScreen {
            0% { transform: translate(0,0); }
            25% { transform: translate(-4px,2px); }
            50% { transform: translate(4px,-2px); }
            75% { transform: translate(-2px,1px); }
            100% { transform: translate(0,0); }
        }
        .screen-flash { animation: flashWhite 0.3s ease-out; }
        .screen-shake { animation: shakeScreen 0.2s cubic-bezier(0.36,0.07,0.19,0.97) both; }
        #game-container { transition: filter 0.1s, background 2s ease; }
        .red-tint { filter: sepia(1) hue-rotate(-30deg) brightness(0.9); transition: filter 0.2s; }

        /* ===== Collection Panel ===== */
        #collection-panel {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            background: var(--c-panel-dark);
            border: 4px solid var(--c-border);
            box-shadow: 6px 6px 0 rgba(0,0,0,0.5);
            padding: 20px 28px; z-index: 90;
            max-width: 85%; max-height: 70%; overflow-y: auto;
            display: none;
        }
        #collection-panel.visible { display: block; }
        #collection-panel h3 {
            font-family: 'Press Start 2P', monospace;
            font-size: 12px; color: var(--c-gold);
            margin-bottom: 14px; text-align: center; letter-spacing: 2px;
        }
        #collection-panel .ending-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        #collection-panel .ending-item {
            font-family: 'DotGothic16', monospace;
            font-size: 13px; padding: 4px 10px;
            border: 2px solid var(--c-border);
            background: var(--c-bg); color: var(--c-text-dim);
        }
        #collection-panel .ending-item.unlocked { color: var(--c-gold); border-color: var(--c-gold); }
        #collection-panel .ending-item.unlocked.special { border-color: var(--c-gold); color: var(--c-gold); }
        #collection-panel .ending-item.unlocked.normal { border-color: var(--c-text-dim); color: var(--c-text); }
        #collection-panel .ending-item.unlocked.meta { border-color: var(--c-cyan); color: var(--c-cyan); }
        #collection-panel .ending-item.unlocked.true { border-color: var(--c-pink); color: var(--c-pink); }
        #collection-close {
            display: block; margin: 14px auto 0;
            padding: 6px 16px;
            font-family: 'DotGothic16', monospace;
            font-size: 14px; border: 3px solid var(--c-border);
            background: var(--c-panel); color: var(--c-text);
            cursor: none; box-shadow: 3px 3px 0 rgba(0,0,0,0.5);
        }

        /* ===== Choice Area ===== */
        #choice-area {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 20px;
            z-index: 60;
        }
        #choice-area.visible { display: flex; }
        .choice-btn {
            padding: 10px 24px;
            font-family: 'DotGothic16', monospace;
            font-size: 15px; letter-spacing: 2px;
            border: 3px solid var(--c-border);
            background: var(--c-panel); color: var(--c-text);
            cursor: none;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.5);
            transition: transform 0.1s ease;
        }
        .choice-btn:hover {
            border-color: var(--c-pink);
            transform: translate(-2px,-2px);
            box-shadow: 5px 5px 0 rgba(0,0,0,0.5);
        }

        /* ===== Cherry Blossom ===== */
        #cherry-blossom-container {
            position: absolute; inset: 0;
            z-index: 150; pointer-events: none;
            display: none; overflow: hidden;
        }
        #cherry-blossom-container.active { display: block; }
        .petal {
            position: absolute; top: -20px;
            background: #ffb7c5;
            border-radius: 50% 0 50% 0;
            animation: petalFall linear infinite;
        }
        @keyframes petalFall {
            0% { transform: translateY(0) translateX(0) rotate(0deg); }
            100% { transform: translateY(110vh) translateX(30px) rotate(360deg); }
        }

        /* ===== Fade to Black ===== */
        #fade-to-black {
            position: absolute; inset: 0;
            background: black; opacity: 0;
            z-index: 300; pointer-events: none;
            transition: opacity 4s ease;
            display: flex; align-items: center; justify-content: center;
        }
        #fade-to-black.active { opacity: 1; pointer-events: all; }
        #true-ending-restart {
            padding: 12px 28px;
            font-family: 'DotGothic16', monospace;
            font-size: 16px; letter-spacing: 3px;
            border: 3px solid var(--c-text);
            background: transparent; color: var(--c-text);
            cursor: none; opacity: 0; pointer-events: none;
            transition: opacity 1s ease;
        }
        #true-ending-restart.visible { opacity: 1; pointer-events: all; }
        /* ===== Start Modal ===== */
#start-modal {
    position: absolute; inset: 0;
    background: rgba(10, 10, 20, 0.92);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DotGothic16', 'Microsoft YaHei', monospace;
}
.modal-panel {
    background: var(--c-panel-dark);
    border: 6px solid var(--c-border);
    box-shadow: 8px 8px 0 rgba(0,0,0,0.6);
    padding: 28px 36px;
    max-width: 90%;
    width: 580px;
    max-height: 85vh;
    overflow-y: auto;
    text-align: center;
}
.modal-panel h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 28px;
    color: var(--c-gold);
    text-shadow: 4px 4px 0 var(--c-border);
    letter-spacing: 4px;
    margin-bottom: 18px;
    border-bottom: 3px solid var(--c-text-dim);
    padding-bottom: 12px;
}
.modal-body {
    color: var(--c-text);
    font-size: 14px;
    line-height: 1.8;
    text-align: left;
    margin: 14px 0 22px 0;
}
.modal-body p {
    margin-bottom: 14px;
}
.modal-label {
    display: inline-block;
    background: var(--c-bg);
    color: var(--c-gold);
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    padding: 2px 8px;
    border: 2px solid var(--c-border);
    letter-spacing: 1px;
    margin-bottom: 4px;
}
.modal-body strong {
    color: var(--c-damage);
}
.modal-author {
    color: var(--c-cyan);
    font-weight: bold;
    letter-spacing: 2px;
}
.modal-btn {
    padding: 12px 32px;
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    letter-spacing: 3px;
    border: 4px solid var(--c-border);
    background: var(--c-panel);
    color: var(--c-text);
    cursor: none;
    box-shadow: 5px 5px 0 rgba(0,0,0,0.5);
    transition: transform 0.1s ease, background 0.15s ease;
    margin-top: 6px;
}
.modal-btn:hover {
    background: var(--c-panel-dark);
    border-color: var(--c-gold);
    transform: translate(-2px, -2px);
    box-shadow: 7px 7px 0 rgba(0,0,0,0.5);
}
.modal-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 3px 3px 0 rgba(0,0,0,0.5);
}
@media (max-width: 600px) {
    .modal-panel { padding: 20px 18px; width: 95%; }
    .modal-panel h1 { font-size: 20px; }
    .modal-body { font-size: 12px; }
    .modal-label { font-size: 9px; }
    .modal-btn { font-size: 13px; padding: 10px 20px; }
}
    </style>
</head>
<body>

    <div id="game-container">
        <div id="pixel-grid"></div>
        <div id="vignette"></div>

        <div id="hud">
            <div class="hud-box">
                <div class="hud-label">ROUND</div>
                <div class="hud-value" id="round-display">01</div>
            </div>
            <div class="hud-box" id="collection-toggle" style="pointer-events:all; cursor:none;">

// ============================================================
//  音效引擎（纯合成，无需外部文件）
// ============================================================
var SoundFX = {
    ctx: null,
    init: function() {
        if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
        // 如果浏览器挂起（移动端策略），恢复它
        if (this.ctx.state === 'suspended') {
            this.ctx.resume();
        }
    },
    // 播放主音调
    playTone: function(freq, duration, type, volume, options) {
        this.init();
        var ctx = this.ctx;
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = type || 'sine';
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        gain.gain.setValueAtTime(volume || 0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (duration || 0.2));
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + (duration || 0.2) + 0.05);

        // 选项：颤音
        if (options && options.vibrato) {
            var vibrato = ctx.createOscillator();
            var vGain = ctx.createGain();
            vibrato.frequency.setValueAtTime(options.vibratoSpeed || 8, ctx.currentTime);
            vGain.gain.setValueAtTime(options.vibratoDepth || 10, ctx.currentTime);
            vibrato.connect(vGain);
            vGain.connect(osc.frequency);
            vibrato.start(ctx.currentTime);
            vibrato.stop(ctx.currentTime + (duration || 0.2) + 0.05);
        }
    },
    // 噪声爆发（鞭子/刀片/摩擦）
    playNoise: function(duration, volume, filterFreq) {
        this.init();
        var ctx = this.ctx;
        var bufferSize = ctx.sampleRate * (duration || 0.15);
        var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        var data = buffer.getChannelData(0);
        for (var i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
        }
        var noise = ctx.createBufferSource();
        noise.buffer = buffer;
        var gain = ctx.createGain();
        gain.gain.setValueAtTime(volume || 0.12, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (duration || 0.15));
        var filter = ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = filterFreq || 800;
        filter.Q.value = 0.8;
        noise.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);
        noise.start(ctx.currentTime);
        noise.stop(ctx.currentTime + (duration || 0.15) + 0.05);
    },
    // 主入口：根据道具类型触发
    play: function(type) {
        var self = this;
        // 防止在静默或未初始化时调用
        try {
            switch(type) {
                // ---- 温柔系 ----
                case 'touch':
                    self.playTone(320, 0.25, 'sine', 0.10, { vibrato: true, vibratoDepth: 4 });
                    setTimeout(function() { self.playTone(440, 0.2, 'sine', 0.07); }, 100);
                    break;
                case 'flower':
                    self.playTone(880, 0.3, 'sine', 0.08);
                    setTimeout(function() { self.playTone(1100, 0.25, 'sine', 0.06); }, 120);
                    break;
                case 'tea':
                    self.playTone(500, 0.2, 'sine', 0.06);
                    setTimeout(function() { self.playTone(700, 0.15, 'sine', 0.05); }, 80);
                    break;
                case 'blanket':
                    self.playTone(200, 0.4, 'sine', 0.12);
                    setTimeout(function() { self.playTone(250, 0.5, 'sine', 0.08); }, 150);
                    break;
                case 'handkerchief':
                    self.playTone(600, 0.15, 'sine', 0.07);
                    self.playTone(900, 0.1, 'sine', 0.05);
                    break;
                case 'bandage':
                    self.playNoise(0.2, 0.06, 1200);
                    self.playTone(400, 0.15, 'sine', 0.05);
                    break;

                // ---- 伤害系 ----
                case 'whip':
                    self.playNoise(0.12, 0.18, 1500);
                    self.playTone(120, 0.1, 'square', 0.04);
                    break;
                case 'blade':
                    self.playNoise(0.08, 0.15, 2000);
                    self.playTone(2000, 0.05, 'square', 0.03);
                    break;
                case 'needle':
                    self.playTone(1600, 0.04, 'square', 0.06);
                    self.playNoise(0.04, 0.10, 3000);
                    break;
                case 'candle':
                    self.playNoise(0.3, 0.10, 300);
                    self.playTone(100, 0.5, 'sawtooth', 0.04);
                    break;
                case 'choke':
                    self.playTone(80, 0.6, 'sawtooth', 0.10);
                    self.playNoise(0.4, 0.08, 150);
                    break;

                // ---- UI ----
                case 'click':
                    self.playTone(800, 0.03, 'square', 0.03);
                    break;
                case 'dialog':
                    self.playTone(400 + Math.random() * 300, 0.02, 'sine', 0.02);
                    break;
                case 'true':
                    self.playTone(523, 0.3, 'sine', 0.10);
                    setTimeout(function() { self.playTone(659, 0.3, 'sine', 0.10); }, 200);
                    setTimeout(function() { self.playTone(784, 0.5, 'sine', 0.12); }, 400);
                    break;

                default: break;
            }
        } catch(e) {
            // 静默失败（部分浏览器可能不支持）
        }
    }

            return ['flower','tea','blanket','handkerchief','touch'].indexOf(item) !== -1;
        }
        function isHealing(item) { return item === 'bandage'; }
        function arraysEqual(a, b) {
            if (a.length !== b.length) return false;
            for (var i = 0; i < a.length; i++) { if (a[i] !== b[i]) return false; }
            return true;
        }
        function hasSubsequence(arr, sub) {
            for (var i = 0; i <= arr.length - sub.length; i++) {
                if (arraysEqual(arr.slice(i, i + sub.length), sub)) return true;
            }
            return false;
        }
        function countItem(arr, item) {
            var c = 0;
            for (var i = 0; i < arr.length; i++) { if (arr[i] === item) c++; }
            return c;
        }

       function showDialog(text, options) {

    options = options || {};

    // 只清理普通互动对白，不影响放置对白
    if(options.replace){
        state.dialogQueue = [];

    });


    if(!state.isDialogShowing){
        processDialogQueue();
    }
}

       function processDialogQueue() {
    if (state.dialogQueue.length === 0) {
    state.isDialogShowing = false;
    state.currentDialog = null;
    clickIndicator.classList.remove('visible');
    setTimeout(function() {
        if (state.dialogQueue.length === 0 && !state.isDialogShowing) {
            dialogBox.classList.remove('visible');
        }
    }, 0);

    // ===== 处理回调 =====
    if (state.metaFinishCallback) {
        var cb = state.metaFinishCallback;
        state.metaFinishCallback = null;
        setTimeout(function(){
            cb();
        },300);
    }
    if (state.onDialogFinish) {
        var cb2 = state.onDialogFinish;
        state.onDialogFinish = null;
        setTimeout(function(){
            cb2();
        },300);
    }
    return;
}
    state.isDialogShowing = true;
    var item = state.dialogQueue.shift();
    state.currentDialog = item;
    dialogName.textContent = item.name;
    dialogBox.classList.add('visible');

    typewriterEffect(item.text, 25, function() {
        if (item.auto) {
            clickIndicator.classList.remove('visible');

            if (state._autoTimer) clearTimeout(state._autoTimer);
            state._autoTimer = setTimeout(function() {
                state._autoTimer = null;
                if (state.currentDialog === item) {
                    processDialogQueue();
                }
            }, item.duration);
        } else {
            clickIndicator.classList.add('visible');
        }
    });
}

        function typewriterEffect(text, speed, callback) {
    dialogText.textContent = '';
    var i = 0;
    state.isTyping = true;
    state.skipTyping = false;
    // ===== 清除旧打字机，避免冲突 =====
    if (state._typewriterInterval) clearInterval(state._typewriterInterval);
    state._typewriterInterval = setInterval(function() {
        if (state.skipTyping) {
            dialogText.textContent = text;
            clearInterval(state._typewriterInterval);
            state._typewriterInterval = null;
            state.isTyping = false;
            if (callback) callback();
            return;
        }
        if (i < text.length) {
            dialogText.textContent += text[i];
             if (i % 2 === 0) SoundFX.play('dialog');
            i++;
        } else {
            clearInterval(state._typewriterInterval);
            state._typewriterInterval = null;
            state.isTyping = false;
            if (callback) callback();
        }
    }, speed);
}

            var gentle = state.playerHistory.filter(function(i) { return isGentle(i); }).length;
            var expr = 'calm';
            if (dmg >= 4) expr = 'empty';
            else if (dmg >= 3 && gentle === 0) expr = 'pain';
            else if (dmg >= 3) expr = 'silent';
            else if (dmg >= 2) expr = 'pain';

        var dragItemType = null;
        var dragStartTime = 0;
        var dragStartPos = { x: 0, y: 0 };
        var itemSlots = document.querySelectorAll('.item-slot');

        itemSlots.forEach(function(slot) {
            slot.addEventListener('mousedown', function(e) {
                if (state.isEnding || state.isStayed) return;
                if (e.button !== 0) return;
                e.preventDefault();
                isDraggingItem = true;
                dragItemType = slot.getAttribute('data-item');
                dragStartTime = Date.now();
                dragStartPos = { x: e.clientX, y: e.clientY };
                dragGhost.src = slot.querySelector('img').src;
                dragGhost.style.display = 'block';
                dragGhost.style.left = e.clientX + 'px';
                dragGhost.style.top = e.clientY + 'px';
                updateCursorImage('fist');
            });
        });

        document.addEventListener('mousemove', function(e) {
            if (isDraggingItem && dragGhost.style.display === 'block') {
                dragGhost.style.left = e.clientX + 'px';
                dragGhost.style.top = e.clientY + 'px';
            }
        });

        document.addEventListener('mouseup', function(e) {
            if (isDraggingItem) {
                var releasedOnCharacter = isPointInCharacterZone(e.clientX, e.clientY);
                if (releasedOnCharacter && dragItemType) {
                    applyItemEffect(dragItemType);
                }
                isDraggingItem = false;
                dragItemType = null;
                dragGhost.style.display = 'none';
                updateCursorImage('open');
            }
        });

        // ============================================================
        //  手部交互（PC）
        // ============================================================
        var handOnCharMouseDown = false;
        var handMouseDownTime = 0;
        var handMouseDownPos = { x: 0, y: 0 };
        var handChokeTriggered = false;

        characterZone.addEventListener('mousedown', function(e) {
            if (state.isEnding || state.isStayed) return;
            if (isDraggingItem) return;
            if (e.button !== 0) return;
            e.preventDefault();
            handOnCharMouseDown = true;
            handMouseDownTime = Date.now();
            handMouseDownPos = { x: e.clientX, y: e.clientY };
            handChokeTriggered = false;
            updateCursorImage('fist');
        });

        document.addEventListener('mousemove', function(e) {
            if (handOnCharMouseDown && !handChokeTriggered) {
                var elapsed = Date.now() - handMouseDownTime;
                var dx = e.clientX - handMouseDownPos.x;
                var dy = e.clientY - handMouseDownPos.y;
                var dist = Math.sqrt(dx*dx + dy*dy);
                if (elapsed >= 200 || dist > 8) {
                    handChokeTriggered = true;
                    showDecorLayer('suffocation');
                    updateCursorImage('fist');
                }
            }
        });

        document.addEventListener('mouseup', function(e) {
            if (handOnCharMouseDown) {
                var elapsed = Date.now() - handMouseDownTime;
                var dx = e.clientX - handMouseDownPos.x;
                var dy = e.clientY - handMouseDownPos.y;
                var dist = Math.sqrt(dx*dx + dy*dy);
                var isOnChar = isPointInCharacterZone(e.clientX, e.clientY);

                if (handChokeTriggered) {
                    if (isOnChar || dist > 5) applyHandInteraction('choke');
                    hideDecorLayer('suffocation');
                } else if (elapsed < 200 && dist < 5 && isOnChar) {
                    applyHandInteraction('touch');
                }
                handOnCharMouseDown = false;
                handChokeTriggered = false;
                hideDecorLayer('suffocation');
                updateCursorImage('open');
            }
        });

        // ============================================================
        //  辅助
        // ============================================================
        function isPointInCharacterZone(px, py) {
            var rect = characterZone.getBoundingClientRect();
            return px >= rect.left && px <= rect.right && py >= rect.top && py <= rect.bottom;
        }
        function isTouchInElement(touch, el) {
            var rect = el.getBoundingClientRect();
            return touch.clientX >= rect.left && touch.clientX <= rect.right &&
                   touch.clientY >= rect.top && touch.clientY <= rect.bottom;
        }

        // ============================================================
        //  触摸事件
        // ============================================================
        var touchOnItem = null;
        var touchItemTimer = null;
        var touchOnChar = false;
        var touchCharTimer = null;
        var touchCharStartTime = 0;
        var touchCharStartPos = { x: 0, y: 0 };
        var touchDragActive = false;
        var touchDragItemType = null;

        itemSlots.forEach(function(slot) {
            slot.addEventListener('touchstart', function(e) {
                if (state.isEnding || state.isStayed) return;
                var touch = e.touches[0];
                touchOnItem = slot;
                touchDragActive = false;
                touchDragItemType = slot.getAttribute('data-item');
                dragGhost.src = slot.querySelector('img').src;
                dragGhost.style.display = 'none';
                updateCursorImage('fist');
                touchItemTimer = setTimeout(function() {
                    touchDragActive = true;
                    dragGhost.style.display = 'block';
                    dragGhost.style.left = touch.clientX + 'px';
                    dragGhost.style.top = touch.clientY + 'px';
                    updateCursorImage('fist');
                }, 500);
            }, { passive: false });

            slot.addEventListener('touchend', function(e) {
                if (touchItemTimer) clearTimeout(touchItemTimer);
                if (touchDragActive && dragGhost.style.display === 'block') {
                    var touch = e.changedTouches[0];
                    if (isPointInCharacterZone(touch.clientX, touch.clientY) && touchDragItemType) {
                        applyItemEffect(touchDragItemType);
                    }
                }
                touchOnItem = null;
                touchDragActive = false;
                touchDragItemType = null;
                dragGhost.style.display = 'none';
                updateCursorImage('open');
            });

            slot.addEventListener('touchmove', function(e) {
                if (touchDragActive) {
                    var touch = e.touches[0];
                    dragGhost.style.left = touch.clientX + 'px';
                    dragGhost.style.top = touch.clientY + 'px';
                    dragGhost.style.display = 'block';
                }
            }, { passive: false });
        });

        characterZone.addEventListener('touchstart', function(e) {
    if (state.isEnding || state.isStayed) return;
    if (touchDragActive) return;
    var touch = e.touches[0];
    touchOnChar = true;
    touchCharStartTime = Date.now();
    touchCharStartPos = { x: touch.clientX, y: touch.clientY };
    updateCursorImage('fist');
    // 不再设置定时器
}, { passive: false });

        characterZone.addEventListener('touchend', function(e) {
    if (touchCharTimer) clearTimeout(touchCharTimer); // 这句可以删掉，因为不再使用定时器
    var elapsed = Date.now() - touchCharStartTime;
    var touch = e.changedTouches[0];
    var dx = touch.clientX - touchCharStartPos.x;
    var dy = touch.clientY - touchCharStartPos.y;
    var dist = Math.sqrt(dx*dx + dy*dy);

    // 判断是 choke 还是 touch
    var isChoke = (elapsed >= 500 || dist > 10);
    if (isChoke) {
        // 显示扼喉特效并应用 choke
        showDecorLayer('suffocation');
        setTimeout(function() {
            hideDecorLayer('suffocation');
        }, 800);
        if (touchOnChar) applyHandInteraction('choke');
    } else {
        // 触摸
        if (touchOnChar) applyHandInteraction('touch');
        // 确保扼喉特效隐藏（防止残留）
        hideDecorLayer('suffocation');
    }
    touchOnChar = false;
    updateCursorImage('open');
}, { passive: false });

        ///characterZone.addEventListener('touchmove', function(e) {
           // if (touchOnChar && Date.now() - touchCharStartTime >= 400) {
            //    showDecorLayer('suffocation');
            //}
        //}, { passive: false });

        document.addEventListener('touchmove', function(e) {
            if (touchDragActive && dragGhost.style.display === 'block') {
                var touch = e.touches[0];
                dragGhost.style.left = touch.clientX + 'px';
                dragGhost.style.top = touch.clientY + 'px';
            }
            if (e.touches[0]) {
                customCursor.style.left = e.touches[0].clientX + 'px';
                customCursor.style.top = e.touches[0].clientY + 'px';
            }
        }, { passive: false });

        // ============================================================
        //  全局点击：对话推进
        // ============================================================
        document.addEventListener('click', function(e) {
            // 不干扰按钮
            if (e.target.closest('button')) return;
            if (e.target.closest('.item-slot')) return;
            if (e.target.closest('#collection-panel')) return;
            if (e.target.closest('#choice-area')) return;
            if (e.target.closest('#fade-to-black')) return;

            // 真结局对话推进
            if (state.trueEndingMode && state.trueEndingWaiting) {
                if (Date.now() - state.lastInteractionTime < 600) return;
                advanceTrueEnding();
                return;
            }

            // 普通对话推进
            if (state.isDialogShowing && state.currentDialog && !state.currentDialog.auto) {
                // 防止刚交互完的 click 事件立刻推进
                if (Date.now() - state.lastInteractionTime < 600) return;
                advanceDialog();
                return;
            }
        }, false);

        // ============================================================
        //  防误操作
        // ============================================================
        document.addEventListener('click', function(e) {
            if (state.isStayed && !endingOverlay.contains(e.target) && !collectionPanel.contains(e.target)) {
                e.preventDefault();
                e.stopPropagation();
            }
        }, true);

        document.addEventListener('DOMContentLoaded', function() {
    // 初始化光标位置
    customCursor.style.left = '50%';
    customCursor.style.top = '40%';

    // 显示开始弹窗，暂不启动游戏
    var startModal = document.getElementById('start-modal');
    var startBtn = document.getElementById('modal-start-btn');
    
    // 若弹窗不存在则直接启动（安全兜底）
    if (!startModal || !startBtn) {
        init();
        console.log('主人，您怎么会在这里？');
        console.log('第' + state.totalRounds + '轮开始');
        return;
    }

    // 点击开始按钮
    startBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        startModal.style.display = 'none';  // 隐藏弹窗
        init();                            // 初始化游戏
        console.log('主人，您怎么会在这里？');
        console.log('第' + state.totalRounds + '轮开始');
    });
});

      
    })();
    
    </script>
</body>
</html>
